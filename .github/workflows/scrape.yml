name: Scrape & Publish

on:
  schedule:
    - cron: "0 6,12,18 * * *"   # 3x daily at 06:00/12:00/18:00 UTC
  workflow_dispatch:             # manual trigger from the Actions tab
  push:
    branches: [main]
    paths:
      - generate_static.py
      - app/scraper/**
      - app/schemas/**
      - requirements.txt

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: scrape-publish
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium --with-deps

      - name: Configure scraper
        env:
          SCRAPER_HEADLESS: "true"
          INDEED_ENABLED: "true"
          SCRAPER_MIN_DELAY: "2"
          SCRAPER_MAX_DELAY: "5"
          SCRAPER_CACHE_TTL_SECONDS: "0"
        run: echo "configured"

      - name: Generate static site (scrape Indeed + fetch legal APIs)
        env:
          SCRAPER_HEADLESS: "true"
          INDEED_ENABLED: "true"
          SCRAPER_MIN_DELAY: "2"
          SCRAPER_MAX_DELAY: "5"
          SCRAPER_CACHE_TTL_SECONDS: "0"
          JWT_SECRET: dummy
        run: python generate_static.py

      - name: Show output stats
        run: |
          echo "dist files:" && ls -la dist/
          echo "job count:" && python -c "import json;print(len(json.load(open('dist/jobs.json'))['jobs']))"

      - name: Commit dist/ to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: refresh job board ($(date -u +%F_%H:%M))"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy-pages:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4