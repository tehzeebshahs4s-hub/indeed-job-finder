name: Publish indeed jobs

# The actual Indeed scraping runs LOCALLY (residential IP) and commits dist/.
# GitHub Actions runners are on datacenter IPs that Indeed/Cloudflare blocks,
# so this workflow only PUBLISHES the already-committed dist/ to GitHub Pages.
# To refresh jobs: run `python generate_static.py` locally, commit dist/, push.

on:
  push:
    branches: [main]
    paths:
      - "dist/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: publish-pages
  cancel-in-progress: false

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Sanity check dist/
        run: |
          test -f dist/index.html || { echo "dist/index.html missing"; exit 1; }
          test -f dist/jobs.json || { echo "dist/jobs.json missing"; exit 1; }
          echo "jobs:" && python3 -c "import json;print(len(json.load(open('dist/jobs.json'))['jobs']))"
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4