services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jobs
      POSTGRES_USER: jobs
      POSTGRES_PASSWORD: jobspass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    env_file: .env
    environment:
      # Override .env to use Postgres in compose
      DATABASE_URL: postgresql+psycopg2://jobs:jobspass@db:5432/jobs
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  pgdata:
