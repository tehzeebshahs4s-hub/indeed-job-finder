# Fly.io config — deploy with: fly deploy
app = "indeed-job-finder"
primary_region = "iad"
kill_signal = "SIGINT"
kill_timeout = 5

[build]
  dockerfile = "Dockerfile"

[deploy]
  strategy = "rolling"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 40

# Headless Chromium needs ~1GB RAM.
[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
