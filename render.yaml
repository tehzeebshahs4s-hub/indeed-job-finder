# Render Blueprint — one-click deploy: https://render.com/docs/blueprints
# After connecting your repo, Render reads this file automatically.
databases:
  - name: indeed-db
    plan: free

services:
  - type: web
    name: indeed-job-finder
    runtime: docker
    plan: starter            # headless Chromium needs ~1GB; use 'free' only with INDEED_ENABLED=false
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: INDEED_ENABLED
        value: "true"        # set "false" on the free plan to run API-only (Adzuna/Jooble)
      # Set these in the Render dashboard (mark as secret):
      - key: JWT_SECRET
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: JOOBLE_API_KEY
        sync: false
      - key: TWO_CAPTCHA_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: indeed-db
          property: connectionString
